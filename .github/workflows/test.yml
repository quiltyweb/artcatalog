name: Test all the things

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GATSBY_SHOPIFY_STORE_DOMAIN: ${{ secrets.GATSBY_SHOPIFY_STORE_DOMAIN }}
      GATSBY_SHOPIFY_STOREFRONT_PASSWORD: ${{ secrets.GATSBY_SHOPIFY_STOREFRONT_PASSWORD }}
      GATSBY_SHOPIFY_ADMIN_PASSWORD: ${{ secrets.GATSBY_SHOPIFY_ADMIN_PASSWORD }}
      GATSBY_SHOPIFY_APP_ID: ${{ secrets.GATSBY_SHOPIFY_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$GATSBY_SHOPIFY_STORE_DOMAIN" ] && missing+=("GATSBY_SHOPIFY_STORE_DOMAIN")
          [ -z "$GATSBY_SHOPIFY_STOREFRONT_PASSWORD" ] && missing+=("GATSBY_SHOPIFY_STOREFRONT_PASSWORD")
          [ -z "$GATSBY_SHOPIFY_ADMIN_PASSWORD" ] && missing+=("GATSBY_SHOPIFY_ADMIN_PASSWORD")
          [ -z "$GATSBY_SHOPIFY_APP_ID" ] && missing+=("GATSBY_SHOPIFY_APP_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install npm packages
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=critical --omit=dev
        continue-on-error: true

      - name: Run client unit tests
        run: npm run test:unit --watchAll=false

      - name: Run e2e tests
        run: npm run test:e2e:ci

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: ./cypress/screenshots/

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: ./cypress/videos/
